name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild -project AIPortals.xcodeproj \
            -scheme AIPortals \
            -configuration Release \
            -derivedDataPath build \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package DMG
        run: |
          cp -R build/Build/Products/Release/AIPortals.app AIPortals.app
          brew install create-dmg
          create-dmg \
            --volname "AIPortals" \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "AIPortals.app" 150 185 \
            --app-drop-link 450 185 \
            "AIPortals-${{ github.ref_name }}.dmg" \
            "AIPortals.app"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: AIPortals-${{ github.ref_name }}.dmg
